<!DOCTYPE html>
<html>
<head>
    <title>Glass Counter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="blue-glow"></div>
<div class="green-glow"></div>

<div class="container">

    <h1>
        Count is <span id="count">0</span>
    </h1>

    <div class="buttons">

        <button class="green"
        onclick="increment()">
            Increment
        </button>


        <button class="red"
        onclick="decrement()">
            Decrement
        </button>


        <button class="blue"
        onclick="incrementFive()">
            Increment 5
        </button>


        <button class="reset"
        onclick="resetCount()">
            Reset
        </button>

    </div>

</div>


<script src="script.js"></script>

</body>
</html>
